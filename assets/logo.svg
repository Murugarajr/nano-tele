<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">nano-tele logo</title>
  <desc id="desc">A perfume concierge logo combining a fragrance bottle, Telegram paper plane, weather sun and rain, and nano agent nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#172554"/>
      <stop offset="1" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="glass" x1="280" y1="70" x2="430" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#7DD3FC" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="liquid" x1="288" y1="170" x2="420" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

